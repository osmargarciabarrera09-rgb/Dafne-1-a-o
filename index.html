body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(45deg, #ff4d6d, #ff8fab);
    color: white;
    text-align: center;
}

/* MENU */
nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
    background: rgba(0,0,0,0.2);
}

nav a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* SECCIONES */
.section {
    display: none;
    padding: 40px 20px;
}

.active {
    display: block;
}

/* GALERIA */
.galeria {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 40px auto;
    overflow: hidden;
}

.item {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    object-fit: cover;
    border-radius: 15px;

    opacity: 0;
    transform: scale(0.8);
    transition: all 0.5s ease;
}

.item.active {
    opacity: 1;
    transform: scale(1);
    z-index: 2;
}

.item.left {
    transform: translateX(-120px) scale(0.8);
    opacity: 0.5;
}

.item.right {
    transform: translateX(120px) scale(0.8);
    opacity: 0.5;
}

/* BOTONES */
.btn {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: white;
    color: #ff4d6d;
    border-radius: 10px;
    font-weight: bold;
}

/* TEXTO LARGO */
#texto, #razonTexto {
    margin-top: 20px;
    max-width: 300px;
    margin-left: auto;
    margin-right: auto;
}
</style>

/* CAMBIAR SECCIONES */
function mostrar(seccion) {
    document.querySelectorAll(".section").forEach(s => {
        s.classList.remove("active");
    });

    document.getElementById(seccion).classList.add("active");
}

/* CARRUSEL */
let index = 0;
let items = document.querySelectorAll(".item");

function actualizarCarrusel() {
    items.forEach(el => {
        el.classList.remove("active", "left", "right");
    });

    items[index].classList.add("active");

    items[(index - 1 + items.length) % items.length].classList.add("left");
    items[(index + 1) % items.length].classList.add("right");

    index = (index + 1) % items.length;
}

actualizarCarrusel();
setInterval(actualizarCarrusel, 3000);
